services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evamodamodesta_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APACHE_RUN_USER: "#1000"
      APACHE_RUN_GROUP: "#1000"
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: evamodamodesta_user
      MYSQL_PASS: evamodamodesta_pass
      MYSQL_DB: evamodamodesta_db
    volumes:
      - ./:/var/www/html
      - ./.docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./.docker/apache/.htaccess.local:/var/www/html/.htaccess:ro
      - ./.docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7.44
    container_name: evamodamodesta_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evamodamodesta_db
      MYSQL_USER: evamodamodesta_user
      MYSQL_PASSWORD: evamodamodesta_pass
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./public/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
